<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; connect-src 'self'">
<title>zKettle - Secret Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f0f0f;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.container{max-width:540px;width:100%;text-align:center}
h1{font-size:1.4rem;margin-bottom:.5rem;color:#fff}
p.sub{font-size:.85rem;color:#888;margin-bottom:2rem}
.card{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:2rem;margin-bottom:1rem}
button{background:#2563eb;color:#fff;border:none;border-radius:6px;padding:.7rem 1.6rem;font-size:.95rem;cursor:pointer;transition:background .15s}
button:hover{background:#1d4ed8}
button:disabled{background:#333;cursor:not-allowed}
.secret-display{background:#111;border:1px solid #333;border-radius:6px;padding:1rem;margin:1rem 0;text-align:left;word-break:break-all;white-space:pre-wrap;font-family:monospace;font-size:.9rem;max-height:400px;overflow-y:auto}
.error{color:#ef4444}
.success{color:#22c55e;font-size:.85rem;margin-top:.5rem}
.actions{display:flex;gap:.5rem;justify-content:center;margin-top:1rem}
</style>
</head>
<body>
<div class="container">
<h1>zKettle</h1>
<p class="sub">Zero-knowledge expiring secret</p>
<div class="card" id="card">
<div id="reveal-view">
<p style="margin-bottom:1.5rem;color:#aaa">This secret will be consumed when revealed.</p>
<button id="reveal-btn" onclick="revealSecret()">Reveal Secret</button>
</div>
<div id="secret-view" style="display:none">
<div class="secret-display" id="plaintext"></div>
<div class="actions">
<button onclick="copySecret()">Copy</button>
</div>
<div class="success" id="copy-msg" style="display:none">Copied to clipboard</div>
</div>
<div id="error-view" style="display:none">
<p class="error" id="error-msg"></p>
</div>
</div>
</div>
<script>
function b64urlDecode(s){s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';const bin=atob(s);const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return bytes}

function showError(msg){
document.getElementById('reveal-view').style.display='none';
document.getElementById('secret-view').style.display='none';
document.getElementById('error-view').style.display='block';
document.getElementById('error-msg').textContent=msg;
}

async function revealSecret(){
const btn=document.getElementById('reveal-btn');
btn.disabled=true;
btn.textContent='Decrypting...';

try{
const hash=window.location.hash.slice(1);
if(!hash){showError('No decryption key found in URL.');return}
const path=window.location.pathname;
const id=path.split('/s/')[1];
if(!id){showError('Invalid secret URL.');return}

const resp=await fetch('/api/secrets/'+encodeURIComponent(id));
if(!resp.ok){
if(resp.status===404){showError('This secret has expired or has already been viewed.');return}
showError('Failed to retrieve secret (HTTP '+resp.status+').');return
}
const data=await resp.json();
const encrypted=b64urlDecode(data.encrypted);
const iv=b64urlDecode(data.iv);
const key=b64urlDecode(hash);

const cryptoKey=await crypto.subtle.importKey('raw',key,{name:'AES-GCM'},false,['decrypt']);
const decrypted=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},cryptoKey,encrypted);
const plaintext=new TextDecoder().decode(decrypted);

document.getElementById('reveal-view').style.display='none';
document.getElementById('plaintext').textContent=plaintext;
document.getElementById('secret-view').style.display='block';
}catch(e){
showError('Decryption failed: '+e.message);
}
}

async function copySecret(){
const text=document.getElementById('plaintext').textContent;
try{
await navigator.clipboard.writeText(text);
const msg=document.getElementById('copy-msg');
msg.style.display='block';
setTimeout(()=>msg.style.display='none',2000);
}catch(e){/* clipboard API may fail in some contexts */}
}
</script>
</body>
</html>
